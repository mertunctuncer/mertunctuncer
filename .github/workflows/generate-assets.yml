name: Update Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: update-profile-assets-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: main-readme 
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure assets directory exists
        run: mkdir -p assets
        
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=dark&hide_border=true&no-bg=true&no-frame=true&langs_count=6
          path: assets/top-langs.svg
          token: ${{ secrets.READ_TOKEN }}

      - name: Generate snake game
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=orange
        env:
          GITHUB_TOKEN: ${{ secrets.READ_TOKEN }}
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update profile assets [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
